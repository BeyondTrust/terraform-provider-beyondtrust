# GoReleaser configuration for Terraform Provider
# Reference: https://developer.hashicorp.com/terraform/registry/providers/publishing
# Template:  https://github.com/hashicorp/terraform-provider-scaffolding-framework

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-beyondtrust
    binary: '{{ .ProjectName }}_v{{ .Version }}'
    main: .
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - darwin
      - freebsd
      - linux
      - windows
    goarch:
      - '386'
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: windows
        goarch: arm

archives:
  - formats:
      - zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # Keep the release in draft; the Release workflow's `publish` job flips it out of
  # draft once every artifact (and the SBOM) is attached, so the Terraform Registry
  # webhook only fires for a complete release.
  draft: true
  # release-please owns the release notes (CHANGELOG); keep its body untouched.
  mode: keep-existing
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  disable: true
