run:
  timeout: 10m
  tests: true
  build-tags: []

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - revive
    - exportloopref
    - nilerr
    - nolintlint

  disable:
    - exhaustive
    - exhaustruct
    - wrapcheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: true
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/beyondtrust/terraform-provider-beyondtrust

  misspell:
    locale: US

  revive:
    severity: warning
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: true

  gosec:
    excludes:
      - G107 # Url provided to HTTP request as taint input - acceptable for API client
      - G404 # Use of weak random number generator (math/rand) - acceptable for test data

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - unparam
        - gocritic

    # Exclude some rules for generated code
    - path: tools/
      linters:
        - all

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
