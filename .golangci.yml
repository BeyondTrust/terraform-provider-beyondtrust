version: 2

run:
  timeout: 10m
  tests: true
  build-tags: []

linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - unconvert
    - gocritic
    - nilerr
    - nolintlint

  disable:
    - exhaustive
    - exhaustruct
    - wrapcheck
    - staticcheck  # AWS SDK v1 deprecation warnings - planned migration
    - unused       # Too many false positives for TODO code
    - revive       # Too strict for Terraform provider patterns
    - errcheck     # Too many false positives for deferred Close() calls
    - gosec        # Too many false positives for API client patterns
    - unparam      # Flags interface method parameters as unused

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: true
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/beyondtrust/terraform-provider-beyondtrust

  misspell:
    locale: US

  revive:
    severity: warning
    rules:
      - name: exported
        disabled: true  # Too verbose for every exported method
      - name: package-comments
        disabled: true
      - name: unused-parameter
        disabled: true  # Interface implementations require unused ctx parameters
      - name: var-naming
        disabled: true  # ApiUrl/ApiVersion style matches tfsdk tags
      - name: redefines-builtin-id
        disabled: true  # min/max are common parameter names

  gosec:
    excludes:
      - G107 # Url provided to HTTP request as taint input - acceptable for API client
      - G402 # TLS InsecureSkipVerify - user-controlled config option
      - G404 # Use of weak random number generator (math/rand) - acceptable for test data
      - G704 # SSRF via taint analysis - false positive for API client

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gosec
        - unparam
        - gocritic
        - errcheck
        - revive

    # Exclude some rules for test helper files
    - path: internal/acctest/
      linters:
        - gosec
        - revive
        - staticcheck  # AWS SDK v1 deprecation - planned for future

    # Exclude defer resp.Body.Close() errcheck - common pattern
    - text: "Error return value of `.*\\.Close` is not checked"
      linters:
        - errcheck

    # Exclude AWS SDK v1 deprecation warnings - planned migration
    - text: "aws-sdk-go is deprecated"
      linters:
        - staticcheck

    # Exclude unused CSRF code - marked as TODO, waiting for backend fix
    - text: "(csrfToken|ensureCSRFToken) is unused"
      linters:
        - unused

    # Exclude unused test helpers - may be used in future tests
    - text: "(testAccProtoV6ProviderFactories|testAccPreCheck|providerConfig|validateJSONPolicy) is unused"
      linters:
        - unused

    # Exclude gosec G404 for test files
    - text: "G404.*weak random"
      linters:
        - gosec
      path: _test\.go

    # Exclude gosec G404 for test helpers
    - text: "G404.*weak random"
      linters:
        - gosec
      path: internal/acctest/

    # Exclude some rules for generated code
    - path: tools/
      linters:
        - all

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
