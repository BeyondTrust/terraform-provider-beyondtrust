version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      minor-gh-actions:
        update-types:
          - minor
          - patch
      major-gh-actions:
        update-types:
          - major
  - package-ecosystem: gomod
    schedule:
      interval: daily
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
    directories:
      - "**/*"
