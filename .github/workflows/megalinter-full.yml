name: Megalinter Full Lint

on:
  pull_request:
    branches:
      - main
    # if any of the linter workflows have changed (e.g. dependabot PR), lint the full code base
    # to ensure we do not accumulate unknown linter tech-debt
    paths:
      - .github/workflows/megalinter*.yml
      - .mega-linter.yml
      - .github/linters/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: MegaLinter
    # MegaLinter's status reporter and SARIF upload need a writable token, which
    # fork and Dependabot PRs do not get, so skip them on those PRs.
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/megalinter.yml
    with:
      full: true
