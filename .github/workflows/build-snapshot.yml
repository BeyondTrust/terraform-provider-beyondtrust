# Validates that the GoReleaser build matrix compiles on every PR, before the
# real Release workflow runs it on main. Snapshot mode skips publish/announce, and
# we additionally skip signing (--skip=sign) since the GPG key is not available
# here, so no secrets are needed and it is safe to run on PRs from forks.
name: Build Snapshot

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: GoReleaser Snapshot Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0  # GoReleaser needs full tag history to compute the version

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --snapshot --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ github.token }}
