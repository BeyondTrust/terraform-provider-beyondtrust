name: Tests

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true
          check-latest: true
          cache-dependency-path: |
            **/go.sum
      - name: Run unit tests
        run: make test-unit
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: always()
        with:
          files: ./coverage-unit.out
          flags: unit
          name: unit-tests

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write  # Required for GitHub OIDC
    if: github.event_name == 'push' || (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]')
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true
          check-latest: true
          cache-dependency-path: |
            **/go.sum
      - name: "Read Terraform version"
        id: terraform-version
        run: echo "version=$(tr -d '\r\n' < .terraform-version)" >> "$GITHUB_OUTPUT"
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}
      - name: "Get GitHub OIDC Token"
        id: oidc
        uses: actions/github-script@v9
        with:
          script: |
            const token = await core.getIDToken('${{ secrets.BEYONDTRUST_SITE_ID }}')
            core.setOutput('token', token)
      - name: Run acceptance tests
        run: make test-acc
        env:
          BEYONDTRUST_API_URL: ${{ secrets.BEYONDTRUST_API_URL }}
          BEYONDTRUST_ACCESS_TOKEN: ${{ steps.oidc.outputs.token }}
          BEYONDTRUST_SITE_ID: ${{ secrets.BEYONDTRUST_SITE_ID }}
          BEYONDTRUST_SERVICE_NAME: ${{ secrets.BEYONDTRUST_SERVICE_NAME }}
          BEYONDTRUST_TEST_AWS_ROLE_ARN: ${{ secrets.BEYONDTRUST_TEST_AWS_ROLE_ARN }}
          BEYONDTRUST_TEST_AWS_ROLE_ARN_2: ${{ secrets.BEYONDTRUST_TEST_AWS_ROLE_ARN_2 }}
          TF_ACC: "1"
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: always()
        with:
          files: ./coverage-acc.out
          flags: acceptance
          name: acceptance-tests
