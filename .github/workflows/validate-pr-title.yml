---
name: Validate PR Title

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        id: validate_pr_title
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Comment on failed validation
        # Fork PRs get a read-only token, so commenting would 403. The check status
        # already reflects the result, so gate to same-repo PRs and stay best-effort.
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          comment-tag: validate-pr-title
          message: |
            PR title must follow [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/):

            ```
            ${{ steps.validate_pr_title.outputs.error_message }}
            ```

      - name: Comment on successful validation
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          comment-tag: validate-pr-title
          create-if-not-exists: false
          mode: upsert
          message: |
            `resolved`: pr title updated and valid.
          reactions: rocket
