name: MegaLinter

on:
  workflow_call:
    inputs:
      full:
        description: "To run a full repository scan or not"
        required: true
        type: boolean

permissions: {}

jobs:
  btsw-linter:
    name: "btsw:Lint Code Base"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint Code Base
        uses: oxsecurity/megalinter/flavors/documentation@8fbdead70d1409964ab3d5afa885e18ee85388bb # v9.4.0
        env:
          VALIDATE_ALL_CODEBASE: ${{ inputs.full }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Upload MegaLinter artifacts
      - name: Archive production artifacts
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MegaLinter reports
          path: |
            megalinter-reports
      - name: Upload MegaLinter scan results to GitHub Security tab
        if: (success() || failure()) && hashFiles('megalinter-reports/megalinter-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: "megalinter-reports/megalinter-report.sarif"
