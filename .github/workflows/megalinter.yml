name: MegaLinter

on:
  workflow_call:
    inputs:
      full:
        description: "To run a full repository scan or not"
        required: true
        type: boolean

permissions: {}

jobs:
  lint-codebase:
    name: Lint Code Base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so MegaLinter can diff against the base branch locally.
          # The composite action sets DEFAULT_BRANCH explicitly, which avoids the
          # authenticated base-ref discovery — so credentials need not be persisted.
          fetch-depth: 0
          persist-credentials: false

      - name: Run MegaLinter
        uses: ./.github/actions/megalinter
        with:
          validate-all-codebase: ${{ inputs.full }}
          github-token: ${{ github.token }}
