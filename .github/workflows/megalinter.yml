name: MegaLinter

on:
  workflow_call:
    inputs:
      full:
        description: "To run a full repository scan or not"
        required: true
        type: boolean

permissions: {}

jobs:
  lint-codebase:
    name: Lint Code Base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run MegaLinter
        uses: ./.github/actions/megalinter
        with:
          validate-all-codebase: ${{ inputs.full }}
          github-token: ${{ github.token }}
