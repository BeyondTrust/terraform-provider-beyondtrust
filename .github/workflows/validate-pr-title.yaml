---
name: "Validate PR Title"
on:
    pull_request:
        types:
            - opened
            - reopened
            - edited
            - synchronize

permissions: {}

jobs:
    validate-pr-title:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
              id: validate_pr_title
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: "Failed PR title validation"
              if: failure()
              uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
              with:
                  comment-tag: validate-pr-title
                  message: |
                      PR title must follow [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/):

                      ```
                      ${{ steps.validate_pr_title.outputs.error_message }}
                      ```
            - name: "Succeeded PR title validation"
              if: success()
              uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
              with:
                  comment-tag: validate-pr-title
                  create-if-not-exists: false
                  mode: upsert
                  message: |
                      `resolved`: pr title updated and valid.
                  reactions: rocket
