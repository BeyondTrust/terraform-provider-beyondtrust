name: "Build artifacts before release"

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JF_ENV_1: ${{ secrets.ARTIFACTORY_DEPLOYER }}

jobs:
  build-service:
    if: ${{ github.actor == 'beyondtrust-release-app[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JFrog
        uses: beyondtrust/setup-jfrog-cli@26d84636538c322aed2f822374a0b976b23caa81 # v2.4.3
        id: configure

      - name: Configure Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true
          check-latest: true
          cache-dependency-path: |
            **/go.sum

      - name: Retrieve version
        id: info
        run: |
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Build provider for all platforms
        env:
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}
            EXT=""
            [[ "$GOOS" == "windows" ]] && EXT=".exe"
            BINARY="terraform-provider-beyondtrust_v${VERSION}${EXT}"
            go build -v \
              -ldflags="-X main.version=${VERSION}" \
              -o "dist/${BINARY}"
            ZIP="terraform-provider-beyondtrust_${VERSION}_${GOOS}_${GOARCH}.zip"
            zip -j "dist/${ZIP}" "dist/${BINARY}"
            rm "dist/${BINARY}"
          done
          cd dist
          sha256sum terraform-provider-beyondtrust_*.zip > "terraform-provider-beyondtrust_${VERSION}_SHA256SUMS"

      - name: Scan dependencies
        uses: beyondtrust/dependency-vulnerability-scan@f263be345e51426f77ca2a8fc73c8b481d3e5062 # v3.0.9

      - name: Deploy provider artifacts to Artifactory
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          jf rt u "dist/terraform-provider-beyondtrust_*" \
            "eng-tf-provider-dev-local/beyondtrust/beyondtrust/${VERSION}/" \
            --flat=true

      - name: Create JFrog Release Bundle
        id: release-bundle
        shell: bash
        run: |
          cat > /tmp/rb_spec.json << EOF
          {
            "files": [
              {
                "pattern": "eng-tf-provider-dev-local/beyondtrust/beyondtrust/${{ steps.info.outputs.version }}/terraform-provider-beyondtrust_*"
              }
            ]
          }
          EOF

          jf rbc --signing-key="${{ steps.configure.outputs.evidence-signing-key-name }}" \
            "${{ steps.configure.outputs.build-name }}" "${{ steps.info.outputs.version }}-${{ github.run_number }}" \
            --spec=/tmp/rb_spec.json

  build-validate:
    runs-on: ubuntu-latest
    needs: [build-service]
    permissions:
      security-events: read
    steps:
      - name: Validate security center
        uses: beyondtrust/security-validation-action@6a9cc1a4f0e5cc4650e3423430cfb56942f6bd7e # v2.2.0