name: "MegaLinter"

description: "Run MegaLinter (documentation flavor) and publish reports and SARIF results."

inputs:
  validate-all-codebase:
    description: "Lint the full codebase (true) or only changed files (false)."
    required: true
  github-token:
    description: "Token used by MegaLinter for status reporting and PR annotations."
    required: true

runs:
  using: "composite"
  steps:
    - name: Lint Code Base
      uses: oxsecurity/megalinter/flavors/documentation@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
      env:
        VALIDATE_ALL_CODEBASE: ${{ inputs.validate-all-codebase }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Archive production artifacts
      if: success() || failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: MegaLinter reports
        path: |
          megalinter-reports

    - name: Upload MegaLinter scan results to GitHub Security tab
      if: (success() || failure()) && hashFiles('megalinter-reports/megalinter-report.sarif') != ''
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
      with:
        sarif_file: "megalinter-reports/megalinter-report.sarif"
